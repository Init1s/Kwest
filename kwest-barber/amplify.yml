version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npm run typecheck
        - npm run lint
        - npm run audit:security
    build:
      commands:
        - npm run build
  # The Next.js config uses `output: "export"` which writes a static
  # bundle to `out/`. Pointing Amplify at `.next/` would publish nothing
  # useful.
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=63072000; includeSubDomains; preload'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=(), interest-cohort=()'
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: *.cdninstagram.com scontent.cdninstagram.com; connect-src 'self' graph.instagram.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
